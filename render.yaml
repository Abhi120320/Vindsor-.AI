databases:
  - name: vindsor-db
    plan: free
    databaseName: vendor_saathi
    user: vendor_saathi

services:
  - type: web
    name: vindsor-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: vindsor-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://vindsor-ai.vercel.app
      - key: RUN_SEED
        value: "true"
      - key: REDIS_URL
        value: redis://127.0.0.1:6379
