databases:
  - name: vindsor-db
    plan: free
    databaseName: vendor_saathi
    user: vendor_saathi

services:
  - type: web
    name: vindsor-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci --legacy-peer-deps --no-audit --no-fund && npx prisma generate && npm run build
    startCommand: npm start
    preDeployCommand: node scripts/render-boot.cjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vindsor-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://vindsor-ai.vercel.app
      - key: COOKIE_SECURE
        value: "true"
      - key: RUN_SEED
        value: "true"
      - key: GROQ_API_KEY
        sync: false
