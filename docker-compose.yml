services:
  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      BACKEND_API_URL: http://backend:8080
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    command: npm run start
    working_dir: /app
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vendor_saathi
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://127.0.0.1:3000
      RUN_SEED: "false"
      NODE_ENV: development
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vendor_saathi
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  pg_data:
  frontend_node_modules:
