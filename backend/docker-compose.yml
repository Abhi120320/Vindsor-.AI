version: "3.9"

services:
  api:
    build: .
    container_name: vendor-saathi-api
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  postgres:
    image: postgres:16
    container_name: vendor-saathi-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vendor_saathi
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: vendor-saathi-redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
